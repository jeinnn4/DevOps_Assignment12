services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=4fsd#dad2e
    ports:
      - "3000:3000"
    networks:
      - monitoring
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'        # <-- key fix: read host filesystem
    pid: host                        # <-- key fix: access host PID namespace
    volumes:
      - '/:/host:ro,rslave'          # <-- key fix: mount host root read-only
    ports:
      - "9100:9100"
    networks:
      - monitoring
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro   # custom config with stub_status
    ports:
      - "8080:80"
    networks:
      - monitoring
    restart: always

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://nginx:80/stub_status   # <-- must match nginx config
    ports:
      - "9113:9113"
    networks:
      - monitoring
    depends_on:
      - nginx
    restart: always

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
